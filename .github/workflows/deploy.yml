name: Deploy to Azure

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  REGISTRY: ${{ secrets.ACR_LOGIN_SERVER }}

jobs:
  # ─────────────────────────────────────────────
  # Backend API (.NET 8)
  # ─────────────────────────────────────────────
  deploy-backend:
    name: Deploy Backend API
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Log in to Azure Container Registry
        uses: azure/docker-login@v2
        with:
          login-server: ${{ secrets.ACR_LOGIN_SERVER }}
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: Build and push backend image
        working-directory: duckly-backend
        run: |
          docker build \
            -t ${{ env.REGISTRY }}/duckly-backend:${{ github.sha }} \
            -t ${{ env.REGISTRY }}/duckly-backend:latest \
            .
          docker push ${{ env.REGISTRY }}/duckly-backend:${{ github.sha }}
          docker push ${{ env.REGISTRY }}/duckly-backend:latest

      - name: Log in to Azure CLI
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Deploy backend to App Service
        uses: azure/webapps-deploy@v3
        with:
          app-name: duckly-production-api
          images: ${{ env.REGISTRY }}/duckly-backend:${{ github.sha }}

      - name: Run database migrations
        uses: azure/cli@v2
        with:
          inlineScript: |
            az webapp restart \
              --resource-group duckly-production-rg \
              --name duckly-production-api

  # ─────────────────────────────────────────────
  # Dashboard SPA (Vite + Nginx)
  # ─────────────────────────────────────────────
  deploy-dashboard:
    name: Deploy Dashboard
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Log in to Azure Container Registry
        uses: azure/docker-login@v2
        with:
          login-server: ${{ secrets.ACR_LOGIN_SERVER }}
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: Build and push dashboard image
        working-directory: duckly-dashboard
        run: |
          docker build \
            --build-arg VITE_API_BASE_URL=${{ secrets.BACKEND_URL }} \
            --build-arg VITE_MAPBOX_TOKEN=${{ secrets.VITE_MAPBOX_TOKEN }} \
            -t ${{ env.REGISTRY }}/duckly-dashboard:${{ github.sha }} \
            -t ${{ env.REGISTRY }}/duckly-dashboard:latest \
            .
          docker push ${{ env.REGISTRY }}/duckly-dashboard:${{ github.sha }}
          docker push ${{ env.REGISTRY }}/duckly-dashboard:latest

      - name: Log in to Azure CLI
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Deploy dashboard to App Service
        uses: azure/webapps-deploy@v3
        with:
          app-name: duckly-production-dashboard
          images: ${{ env.REGISTRY }}/duckly-dashboard:${{ github.sha }}

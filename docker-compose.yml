services:
  postgres:
    image: postgis/postgis:16-3.4
    ports:
      - "5433:5432"
    environment:
      POSTGRES_DB: duckly
      POSTGRES_USER: duckly
      POSTGRES_PASSWORD: duckly_dev
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U duckly"]
      interval: 5s
      timeout: 5s
      retries: 10

  minio:
    image: minio/minio
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./duckly-backend
      dockerfile: Dockerfile
    ports:
      - "5001:8080"
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_started
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__DefaultConnection: "Host=postgres;Port=5432;Database=duckly;Username=duckly;Password=duckly_dev"
      Jwt__Secret: "super-secret-dev-key-change-in-production-min-32-chars!!"
      Jwt__Issuer: duckly-backend
      Jwt__Audience: duckly-frontend
      Jwt__ExpiryHours: "24"
      Storage__Endpoint: minio:9000
      Storage__AccessKey: minioadmin
      Storage__SecretKey: minioadmin
      Storage__BucketName: duckly-images
      Storage__UseSSL: "false"
      Stripe__SecretKey: ${STRIPE_SECRET_KEY:-sk_test_placeholder}
      Stripe__WebhookSecret: ${STRIPE_WEBHOOK_SECRET:-whsec_placeholder}
      Hangfire__Dashboard: "true"

  dashboard:
    build:
      context: ./duckly-dashboard
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: http://localhost:5001
        VITE_MAPBOX_TOKEN: ${VITE_MAPBOX_TOKEN:-}
    ports:
      - "5174:80"
    depends_on:
      - backend

  landing:
    build:
      context: ./duckly-landing
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: http://localhost:5001
        NEXT_PUBLIC_DASHBOARD_URL: http://localhost:5174
    ports:
      - "3001:3000"
    depends_on:
      - backend

volumes:
  postgres_data:
  minio_data:
